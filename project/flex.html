
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .parent {
        display: grid;
        grid-template-columns: repeat(3,1fr);
        grid-template-rows: 200px 200px 200px;
        gap: 20px;
    }
    .child{
        background-color: black;
        color: bisque;
        font-size: 40px;
        display: grid;
        justify-content: center;
        align-items: center;  
          }
          #box1{
            /* grid-column-start: 1;
            grid-column-end:3 */
            grid-column: span 2;

          }
          #box3{
            grid-row: span 2;
          }
          #box7{
            grid-row: span 2;
          }
          #box5{
            grid-column: span 2;
          }
</style>
</head>
<body>
   <div class="parent">
    <div class="child" id="box1">1</div>
    <div class="child" id="box2">2</div>
    <div class="child" id="box3">3</div>
    <div class="child" id="box4">4</div>
    <div class="child" id="box5">5</div>
    <div class="child" id="box6">6</div>
    <div class="child" id="box7">7</div>
    <div class="child" id="box8">8</div>
<div class="child" id="box9">9</div>   </div>
</body>
</html>
