<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .one{
        background-color: black;
        height: 100px;
        width: 100px;
        margin: 5px;
        position: static;
    }
     .two{
        background-color: purple;
        height: 100px;
        width: 100px;
        margin: 5px;
        position: relative;
        left: 50px;
    }
     .three{
        background-color:plum;
        height: 100px;
        width: 100px;
        margin: 5px;
        position: static;
        z-index: 2;
    }
</style>
</head>
<body>
    <div class="one"></div>
    <div class="two"></div>
    <div class="three"></div>
</body>
</html>
